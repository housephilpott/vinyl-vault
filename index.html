<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎵 Vinyl Vault</title>
  <style>
    /* ===== CSS RESET & VARIABLES ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-dark:    #121212;
      --bg-card:    #1e1e1e;
      --bg-input:   #2a2a2a;
      --accent:     #e8a030;
      --accent-dim: #c47f1a;
      --text:       #e0e0e0;
      --text-muted: #888;
      --danger:     #e04040;
      --success:    #40b060;
      --info:       #3a8fd4;
      --radius:     10px;
      --shadow:     0 4px 20px rgba(0,0,0,.4);
    }

    /* Prevent body-level horizontal scroll */
    html, body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 30px 16px 10px;
      cursor: pointer;
    }
    header h1 {
      font-size: 2.4rem;
      letter-spacing: 2px;
      color: var(--accent);
    }
    header p {
      color: var(--text-muted);
      font-size: .95rem;
      margin-top: 4px;
    }

    /* ===== VIEWS (fade transition) ===== */
    .view {
      display: none;
      opacity: 0;
      transition: opacity .3s ease;
      max-width: 1060px;
      margin: 0 auto;
      padding: 20px 16px 60px;
      overflow-x: hidden;
    }
    .view.active { display: block; }
    .view.visible { opacity: 1; }

    /* ===== HOME BUTTONS ===== */
    .home-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      margin-top: 40px;
    }
    .home-btn {
      flex: 1 1 250px;
      max-width: 280px;
      background: var(--bg-card);
      border: 2px solid var(--bg-input);
      border-radius: var(--radius);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: transform .2s, border-color .2s, box-shadow .2s;
      box-shadow: var(--shadow);
    }
    .home-btn:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(232,160,48,.15);
    }
    .home-btn .icon { font-size: 2.8rem; margin-bottom: 12px; }
    .home-btn .label { font-size: 1.15rem; font-weight: 600; }
    .home-btn .count {
      font-size: .85rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ===== BACK BUTTON ===== */
    .back-btn {
      background: none;
      border: 1px solid var(--text-muted);
      color: var(--text-muted);
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: .85rem;
      transition: color .2s, border-color .2s;
      margin-bottom: 18px;
    }
    .back-btn:hover { color: var(--accent); border-color: var(--accent); }

    /* ===== SECTION TITLES ===== */
    .view-title {
      font-size: 1.6rem;
      margin-bottom: 16px;
      color: var(--accent);
    }

    /* ===== SEARCH BAR ===== */
    .search-bar {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--bg-input);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text);
      font-size: .95rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .2s;
    }
    .search-bar:focus { border-color: var(--accent); }

    /* ===== TABLE ===== */
    .table-wrap { overflow-x: auto; max-width: 100%; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: .9rem;
    }
    thead th {
      text-align: left;
      padding: 10px 12px;
      background: var(--bg-input);
      color: var(--accent);
      position: sticky;
      top: 0;
      white-space: nowrap;
    }
    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid #2a2a2a;
      vertical-align: middle;
    }
    tbody tr { transition: background .15s; }
    tbody tr:hover { background: rgba(232,160,48,.06); }

    .empty-msg {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 1rem;
    }

    /* ===== ALBUM ART THUMBNAIL ===== */
    .art-thumb {
      width: 50px;
      height: 50px;
      border-radius: 6px;
      object-fit: cover;
      display: block;
    }
    .art-placeholder {
      width: 50px;
      height: 50px;
      border-radius: 6px;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* ===== ACTION BUTTONS (in-table) ===== */
    .btn-sm {
      padding: 5px 12px;
      border: none;
      border-radius: 5px;
      font-size: .8rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity .2s;
      white-space: nowrap;
      margin-right: 4px;
      margin-bottom: 2px;
    }
    .btn-sm:hover { opacity: .8; }
    .btn-move  { background: var(--success); color: #fff; }
    .btn-edit  { background: var(--accent); color: #121212; }
    .btn-del   { background: var(--danger); color: #fff; }

    /* ===== FORM ===== */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-group { display: flex; flex-direction: column; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: .85rem;
      margin-bottom: 4px;
      color: var(--text-muted);
    }
    .form-group input,
    .form-group select {
      padding: 10px 12px;
      border: 1px solid var(--bg-input);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-group select[multiple] { min-height: 120px; }
    .form-group select option { padding: 4px 8px; }
    .form-group select option:checked { background: var(--accent-dim); color: #fff; }

    .submit-btn {
      margin-top: 20px;
      padding: 12px 36px;
      background: var(--accent);
      color: #121212;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .submit-btn:hover { background: var(--accent-dim); }

    /* ===== MODAL OVERLAY ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 900;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .modal-overlay.open {
      display: flex;
    }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--bg-input);
      border-radius: 12px;
      padding: 28px 24px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,.6);
    }
    .modal h2 {
      font-size: 1.3rem;
      color: var(--accent);
      margin-bottom: 18px;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-cancel {
      padding: 10px 24px;
      background: var(--bg-input);
      color: var(--text-muted);
      border: 1px solid var(--text-muted);
      border-radius: 6px;
      font-size: .95rem;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .modal-cancel:hover { color: var(--text); border-color: var(--text); }

    /* ===== SPINNER / TOAST ===== */
    .spinner {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }
    .spinner::after {
      content: '';
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid var(--text-muted);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-left: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--accent);
      padding: 12px 24px;
      border-radius: 8px;
      font-size: .9rem;
      opacity: 0;
      transition: transform .35s, opacity .35s;
      z-index: 999;
      pointer-events: none;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      header h1 { font-size: 1.8rem; }
      .home-btn { padding: 28px 16px; }
      .modal { padding: 20px 16px; }
    }
  </style>
</head>
<body>

  <!-- HEADER (click to go home) -->
  <header onclick="showView('home')">
    <h1>🎵 Vinyl Vault</h1>
    <p>Your personal record collection tracker</p>
  </header>

  <!-- ===== HOME VIEW ===== -->
  <div id="home" class="view active visible">
    <div class="home-grid">
      <div class="home-btn" onclick="openList('owned')">
        <div class="icon">💿</div>
        <div class="label">My Collection</div>
        <div class="count" id="count-owned">Loading…</div>
      </div>
      <div class="home-btn" onclick="openList('want')">
        <div class="icon">🛒</div>
        <div class="label">Want List</div>
        <div class="count" id="count-want">Loading…</div>
      </div>
      <div class="home-btn" onclick="showView('add')">
        <div class="icon">➕</div>
        <div class="label">Add Record</div>
      </div>
    </div>
  </div>

  <!-- ===== OWNED LIST VIEW ===== -->
  <div id="owned" class="view">
    <button class="back-btn" onclick="showView('home')">← Back</button>
    <h2 class="view-title">💿 My Collection</h2>
    <input class="search-bar" id="search-owned" placeholder="Search by artist, title, genre…" oninput="filterTable('owned')" />
    <div class="table-wrap" id="table-owned"></div>
  </div>

  <!-- ===== WANT LIST VIEW ===== -->
  <div id="want" class="view">
    <button class="back-btn" onclick="showView('home')">← Back</button>
    <h2 class="view-title">🛒 Want List</h2>
    <input class="search-bar" id="search-want" placeholder="Search by artist, title, genre…" oninput="filterTable('want')" />
    <div class="table-wrap" id="table-want"></div>
  </div>

  <!-- ===== ADD RECORD VIEW ===== -->
  <div id="add" class="view">
    <button class="back-btn" onclick="showView('home')">← Back</button>
    <h2 class="view-title">➕ Add a Record</h2>
    <form id="add-form" onsubmit="submitRecord(event)">
      <div class="form-grid">
        <div class="form-group">
          <label for="f-artist">Artist</label>
          <input type="text" id="f-artist" required />
        </div>
        <div class="form-group">
          <label for="f-title">Title</label>
          <input type="text" id="f-title" required />
        </div>
        <div class="form-group">
          <label for="f-version">Version</label>
          <input type="text" id="f-version" placeholder="e.g. Remastered, 180g, First Press" />
        </div>
        <div class="form-group">
          <label for="f-year-release">Year of Release</label>
          <input type="number" id="f-year-release" min="1900" max="2099" required />
        </div>
        <div class="form-group">
          <label for="f-year-purchase">Year of Purchase</label>
          <input type="number" id="f-year-purchase" min="1900" max="2099" />
        </div>
        <div class="form-group">
          <label for="f-list">Add to</label>
          <select id="f-list">
            <option value="Owned">My Collection (Owned)</option>
            <option value="WantToBuy">Want List</option>
          </select>
        </div>
        <div class="form-group full">
          <label for="f-genre">Genre (hold Ctrl / Cmd to select multiple)</label>
          <select id="f-genre" multiple></select>
        </div>
        <div class="form-group full">
          <label for="f-art">Cover Art URL (optional)</label>
          <input type="url" id="f-art" placeholder="https://example.com/album-cover.jpg" />
        </div>
      </div>
      <button type="submit" class="submit-btn">Add Record</button>
    </form>
  </div>

  <!-- ===== EDIT MODAL ===== -->
  <div class="modal-overlay" id="edit-overlay" onclick="if(event.target===this)closeEditModal()">
    <div class="modal">
      <h2>✏️ Edit Record</h2>
      <form id="edit-form" onsubmit="saveEdit(event)">
        <input type="hidden" id="e-list" />
        <input type="hidden" id="e-row" />
        <div class="form-grid">
          <div class="form-group">
            <label for="e-artist">Artist</label>
            <input type="text" id="e-artist" required />
          </div>
          <div class="form-group">
            <label for="e-title">Title</label>
            <input type="text" id="e-title" required />
          </div>
          <div class="form-group">
            <label for="e-version">Version</label>
            <input type="text" id="e-version" />
          </div>
          <div class="form-group">
            <label for="e-year-release">Year of Release</label>
            <input type="number" id="e-year-release" min="1900" max="2099" required />
          </div>
          <div class="form-group">
            <label for="e-year-purchase">Year of Purchase</label>
            <input type="number" id="e-year-purchase" min="1900" max="2099" />
          </div>
          <div class="form-group full">
            <label for="e-genre">Genre (hold Ctrl / Cmd to select multiple)</label>
            <select id="e-genre" multiple></select>
          </div>
          <div class="form-group full">
            <label for="e-art">Cover Art URL (optional)</label>
            <input type="url" id="e-art" placeholder="https://example.com/album-cover.jpg" />
          </div>
        </div>
        <div class="modal-actions">
          <button type="submit" class="submit-btn">Save Changes</button>
          <button type="button" class="modal-cancel" onclick="closeEditModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <script>
    /* ===========================================================
       CONFIGURATION — your deployed Apps Script web app URL
       =========================================================== */
    const API_URL = 'https://script.google.com/macros/s/AKfycbzKHdMXbniNbfimCsTa02N5VhJbn3WeQqtN0D0VQCKRtRICezqHtq0NnmXU6363VAEjKg/exec';

    /* ===== STATE ===== */
    let ownedData  = [];
    let wantData   = [];
    let genresList = [];
    let currentListType = null;  // tracks which list view is open (for refresh after edit)

    /* ===== VIEW NAVIGATION ===== */
    function showView(id) {
      document.querySelectorAll('.view').forEach(v => {
        v.classList.remove('visible');
        setTimeout(() => v.classList.remove('active'), 300);
      });
      setTimeout(() => {
        const el = document.getElementById(id);
        el.classList.add('active');
        requestAnimationFrame(() => el.classList.add('visible'));
      }, 300);
      if (id === 'home') loadCounts();
    }

    /* ===== TOAST NOTIFICATION ===== */
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    /* ===== API HELPERS ===== */
    async function apiGet(action) {
      const res = await fetch(`${API_URL}?action=${action}`, { redirect: 'follow' });
      return res.json();
    }

    async function apiPost(payload) {
      const res = await fetch(API_URL, {
        method: 'POST',
        redirect: 'follow',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      return res.json();
    }

    /* ===== RECORD COUNTS ON HOME SCREEN ===== */
    async function loadCounts() {
      try {
        const [ownedJson, wantJson] = await Promise.all([
          apiGet('getOwned'),
          apiGet('getWantToBuy')
        ]);
        ownedData = ownedJson.data || [];
        wantData  = wantJson.data  || [];
        document.getElementById('count-owned').textContent =
          ownedData.length === 1 ? '1 record' : ownedData.length + ' records';
        document.getElementById('count-want').textContent =
          wantData.length === 1 ? '1 record' : wantData.length + ' records';
      } catch {
        document.getElementById('count-owned').textContent = '—';
        document.getElementById('count-want').textContent  = '—';
      }
    }

    /* ===== OPEN A LIST VIEW ===== */
    async function openList(type) {
      currentListType = type;
      showView(type);
      const container = document.getElementById(`table-${type}`);
      container.innerHTML = '<div class="spinner">Loading</div>';

      try {
        const action = type === 'owned' ? 'getOwned' : 'getWantToBuy';
        const json   = await apiGet(action);
        if (type === 'owned') ownedData = json.data || [];
        else                  wantData  = json.data || [];
        renderTable(type);
      } catch (e) {
        container.innerHTML = '<div class="empty-msg">⚠️ Could not load data. Check your API URL.</div>';
      }
    }

    /* ===== RENDER TABLE ===== */
    function renderTable(type) {
      const data = type === 'owned' ? ownedData : wantData;
      const container = document.getElementById(`table-${type}`);
      const query = (document.getElementById(`search-${type}`)?.value || '').toLowerCase();

      const filtered = data.filter(r =>
        !query ||
        (r.Artist||'').toLowerCase().includes(query) ||
        (r.Title||'').toLowerCase().includes(query) ||
        (r.Genre||'').toLowerCase().includes(query)
      );

      /* Sort alphabetically by Artist, then Title */
      filtered.sort((a, b) => {
        const artistCmp = (a.Artist||'').localeCompare(b.Artist||'', undefined, { sensitivity: 'base' });
        return artistCmp !== 0 ? artistCmp : (a.Title||'').localeCompare(b.Title||'', undefined, { sensitivity: 'base' });
      });

      if (!filtered.length) {
        container.innerHTML = `<div class="empty-msg">${data.length ? 'No matching records.' : 'No records yet — go add some!'}</div>`;
        return;
      }

      const listName = type === 'owned' ? 'Owned' : 'WantToBuy';

      let html = `<table>
        <thead><tr>
          <th></th><th>Artist</th><th>Title</th><th>Version</th>
          <th>Released</th><th>Purchased</th><th>Genre</th><th></th>
        </tr></thead><tbody>`;

      filtered.forEach(r => {
        const artUrl = (r.CoverArtUrl || '').trim();
        const artHtml = artUrl
          ? `<img class="art-thumb" src="${esc(artUrl)}" alt="Cover" onerror="this.outerHTML='<div class=\\'art-placeholder\\'>🎵</div>'" />`
          : `<div class="art-placeholder">🎵</div>`;

        html += `<tr>
          <td>${artHtml}</td>
          <td>${esc(r.Artist)}</td>
          <td>${esc(r.Title)}</td>
          <td>${esc(r.Version)}</td>
          <td>${esc(r.YearOfRelease)}</td>
          <td>${esc(r.YearOfPurchase)}</td>
          <td>${esc(r.Genre)}</td>
          <td style="white-space:nowrap">
            ${type === 'want' ? `<button class="btn-sm btn-move" onclick="moveToOwned(${r._row})">Move to Collection</button>` : ''}
            <button class="btn-sm btn-edit" onclick='openEditModal(${JSON.stringify(listName)}, ${JSON.stringify(r)})'>Edit</button>
            <button class="btn-sm btn-del" onclick="deleteRecord('${type}', ${r._row})">Delete</button>
          </td>
        </tr>`;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function esc(v) {
      if (v === undefined || v === null) return '';
      const d = document.createElement('div');
      d.textContent = String(v);
      return d.innerHTML;
    }

    function filterTable(type) { renderTable(type); }

    /* ===== MOVE TO OWNED ===== */
    async function moveToOwned(row) {
      if (!confirm('Move this record to your collection?')) return;
      try {
        /* Send current year as Year of Purchase */
        await apiPost({ action: 'moveToOwned', row, yearOfPurchase: new Date().getFullYear() });
        toast('✅ Moved to collection!');
        openList('want');
      } catch { toast('⚠️ Error moving record.'); }
    }

    /* ===== DELETE RECORD ===== */
    async function deleteRecord(type, row) {
      if (!confirm('Delete this record?')) return;
      const list = type === 'owned' ? 'Owned' : 'WantToBuy';
      try {
        await apiPost({ action: 'deleteRecord', list, row });
        toast('🗑️ Record deleted.');
        openList(type);
      } catch { toast('⚠️ Error deleting record.'); }
    }

    /* ===== ADD RECORD ===== */
    async function submitRecord(e) {
      e.preventDefault();
      const genreSel = document.getElementById('f-genre');
      const genres = Array.from(genreSel.selectedOptions).map(o => o.value).join(', ');

      const payload = {
        action:          'addRecord',
        list:            document.getElementById('f-list').value,
        artist:          document.getElementById('f-artist').value.trim(),
        title:           document.getElementById('f-title').value.trim(),
        version:         document.getElementById('f-version').value.trim(),
        yearOfRelease:   document.getElementById('f-year-release').value,
        yearOfPurchase:  document.getElementById('f-year-purchase').value,
        genre:           genres,
        coverArtUrl:     document.getElementById('f-art').value.trim()
      };

      try {
        await apiPost(payload);
        toast('🎉 Record added!');
        document.getElementById('add-form').reset();
      } catch { toast('⚠️ Error adding record.'); }
    }

    /* ===== EDIT MODAL ===== */
    function openEditModal(listName, record) {
      document.getElementById('e-list').value         = listName;
      document.getElementById('e-row').value          = record._row;
      document.getElementById('e-artist').value       = record.Artist || '';
      document.getElementById('e-title').value        = record.Title || '';
      document.getElementById('e-version').value      = record.Version || '';
      document.getElementById('e-year-release').value = record.YearOfRelease || '';
      document.getElementById('e-year-purchase').value= record.YearOfPurchase || '';
      document.getElementById('e-art').value          = record.CoverArtUrl || '';

      // Set genre selections
      const sel = document.getElementById('e-genre');
      const recordGenres = (record.Genre || '').split(',').map(g => g.trim().toLowerCase());
      Array.from(sel.options).forEach(opt => {
        opt.selected = recordGenres.includes(opt.value.toLowerCase());
      });

      document.getElementById('edit-overlay').classList.add('open');
    }

    function closeEditModal() {
      document.getElementById('edit-overlay').classList.remove('open');
    }

    async function saveEdit(e) {
      e.preventDefault();
      const genreSel = document.getElementById('e-genre');
      const genres = Array.from(genreSel.selectedOptions).map(o => o.value).join(', ');

      const payload = {
        action:          'updateRecord',
        list:            document.getElementById('e-list').value,
        row:             parseInt(document.getElementById('e-row').value, 10),
        artist:          document.getElementById('e-artist').value.trim(),
        title:           document.getElementById('e-title').value.trim(),
        version:         document.getElementById('e-version').value.trim(),
        yearOfRelease:   document.getElementById('e-year-release').value,
        yearOfPurchase:  document.getElementById('e-year-purchase').value,
        genre:           genres,
        coverArtUrl:     document.getElementById('e-art').value.trim()
      };

      try {
        await apiPost(payload);
        toast('✅ Record updated!');
        closeEditModal();
        if (currentListType) openList(currentListType);
      } catch { toast('⚠️ Error updating record.'); }
    }

    /* ===== LOAD GENRES ON STARTUP ===== */
    async function loadGenres() {
      try {
        const json = await apiGet('getGenres');
        genresList = json.data || [];
        populateGenreSelect('f-genre');
        populateGenreSelect('e-genre');
      } catch { /* genres will be empty until API is connected */ }
    }

    function populateGenreSelect(selectId) {
      const sel = document.getElementById(selectId);
      sel.innerHTML = '';
      genresList.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = g;
        sel.appendChild(opt);
      });
    }

    // Initialise
    loadGenres();
    loadCounts();
  </script>
</body>
</html>
